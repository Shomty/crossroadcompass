<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <radialGradient id="cosmicBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0c0820"/>
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="40%" stop-color="#F0CC6E"/>
      <stop offset="70%" stop-color="#B8882A"/>
