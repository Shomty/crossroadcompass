<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" width="520" height="160">
  <defs>
    <!-- Deep cosmic gradient for background circle -->
    <radialGradient id="cosmicBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1035"/>
      <stop offset="100%" stop-color="#0c0820"/>
    </radialGradient>

    <!-- Gold gradient for compass ring -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="40%" stop-color="#F0CC6E"/>
      <stop offset="70%" stop-color="#B8882A"/>
      <stop offset="100%" stop-color="#E8BC55"/>
    </linearGradient>

    <!-- North needle gradient -->
    <linearGradient id="northNeedle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0CC6E"/>
      <stop offset="100%" stop-color="#B8882A"/>
    </linearGradient>

    <!-- South needle gradient -->
    <linearGradient id="southNeedle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a3a6e"/>
      <stop offset="100%" stop-color="#2d2050"/>
    </linearGradient>

    <!-- Star glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle outer glow -->
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===================== -->
  <!-- COMPASS MARK (left)   -->
  <!-- ===================== -->
  <g transform="translate(80, 80)">

    <!-- Outer decorative ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="url(#goldRing)" stroke-width="1.2" opacity="0.5"/>

    <!-- Main compass body -->
    <circle cx="0" cy="0" r="55" fill="url(#cosmicBg)"/>

    <!-- Outer compass ring -->
    <circle cx="0" cy="0" r="55" fill="none" stroke="url(#goldRing)" stroke-width="2.5"/>

    <!-- Inner decorative ring -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#D4A843" stroke-width="0.6" opacity="0.4"/>

    <!-- Cardinal direction tick marks -->
    <!-- N -->
    <line x1="0" y1="-55" x2="0" y2="-46" stroke="#F0CC6E" stroke-width="2.5"/>
    <!-- S -->
    <line x1="0" y1="55" x2="0" y2="46" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>
    <!-- E -->
    <line x1="55" y1="0" x2="46" y2="0" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>
    <!-- W -->
    <line x1="-55" y1="0" x2="-46" y2="0" stroke="#D4A843" stroke-width="1.5" opacity="0.6"/>

    <!-- Intercardinal ticks (NE, NW, SE, SW) -->
    <line x1="38.9" y1="-38.9" x2="33.2" y2="-33.2" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
    <line x1="-38.9" y1="-38.9" x2="-33.2" y2="-33.2" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
    <line x1="38.9" y1="38.9" x2="33.2" y2="33.2" stroke="#D4A843" stroke-width="1" opacity="0.4"/>
    <line x1="-38.9" y1="38.9" x2="-33.2" y2="33.2" stroke="#D4A843" stroke-width="1" opacity="0.4"/>

    <!-- Subtle star field inside compass -->
    <circle cx="-28" cy="-18" r="0.8" fill="#D4A843" opacity="0.5"/>
    <circle cx="22" cy="-30" r="0.6" fill="#F0CC6E" opacity="0.6"/>
    <circle cx="-15" cy="25" r="0.7" fill="#D4A843" opacity="0.4"/>
    <circle cx="30" cy="18" r="0.5" fill="#F0CC6E" opacity="0.5"/>
    <circle cx="-35" cy="10" r="0.6" fill="#D4A843" opacity="0.4"/>
    <circle cx="10" cy="-12" r="0.4" fill="#F0CC6E" opacity="0.3"/>
    <!-- Extra stars -->
    <circle cx="-20" cy="-38" r="0.9" fill="#F0CC6E" opacity="0.7"/>
    <circle cx="38" cy="-22" r="0.7" fill="#D4A843" opacity="0.6"/>
    <circle cx="18" cy="36" r="0.8" fill="#F0CC6E" opacity="0.5"/>
    <circle cx="-38" cy="24" r="0.6" fill="#D4A843" opacity="0.5"/>
    <circle cx="-10" cy="-28" r="0.5" fill="#F0CC6E" opacity="0.6"/>
    <circle cx="28" cy="-10" r="0.6" fill="#D4A843" opacity="0.4"/>
    <circle cx="-32" cy="-30" r="0.7" fill="#F0CC6E" opacity="0.5"/>
    <circle cx="40" cy="8" r="0.5" fill="#F0CC6E" opacity="0.4"/>
    <circle cx="-5" cy="40" r="0.6" fill="#D4A843" opacity="0.5"/>
    <circle cx="-42" cy="-8" r="0.5" fill="#F0CC6E" opacity="0.4"/>
    <circle cx="14" cy="-42" r="0.6" fill="#D4A843" opacity="0.5"/>
    <circle cx="36" cy="34" r="0.5" fill="#F0CC6E" opacity="0.4"/>
    <circle cx="-24" cy="38" r="0.4" fill="#D4A843" opacity="0.4"/>
    <circle cx="6" cy="28" r="0.5" fill="#F0CC6E" opacity="0.35"/>
    <circle cx="-18" cy="8" r="0.4" fill="#D4A843" opacity="0.3"/>
    <circle cx="24" cy="-22" r="0.4" fill="#F0CC6E" opacity="0.35"/>
    <!-- Brighter accent stars with glow -->
    <circle cx="-26" cy="-8" r="1.1" fill="#F0CC6E" opacity="0.55" filter="url(#glow)"/>
    <circle cx="32" cy="-32" r="1.0" fill="#F0CC6E" opacity="0.5" filter="url(#glow)"/>
    <circle cx="-12" cy="34" r="1.0" fill="#D4A843" opacity="0.5" filter="url(#glow)"/>
    <circle cx="20" cy="26" r="1.1" fill="#F0CC6E" opacity="0.45" filter="url(#glow)"/>

    <!-- Crossroads cross lines (subtle) -->
    <line x1="-38" y1="0" x2="38" y2="0" stroke="#D4A843" stroke-width="0.5" opacity="0.2"/>
    <line x1="0" y1="-38" x2="0" y2="38" stroke="#D4A843" stroke-width="0.5" opacity="0.2"/>

    <!-- North needle (gold, pointing up) -->
    <polygon points="0,-42 -8,-8 0,-16 8,-8" fill="url(#northNeedle)" filter="url(#glow)"/>

    <!-- South needle (deep purple, pointing down) -->
    <polygon points="0,42 -8,8 0,16 8,8" fill="url(#southNeedle)"/>

    <!-- East/West crossbars -->
    <polygon points="42,0 8,-5 16,0 8,5" fill="#2d2050" opacity="0.6"/>
    <polygon points="-42,0 -8,-5 -16,0 -8,5" fill="#2d2050" opacity="0.6"/>

    <!-- Center jewel -->
    <circle cx="0" cy="0" r="6" fill="#0c0820" stroke="url(#goldRing)" stroke-width="1.8"/>
    <circle cx="0" cy="0" r="3" fill="#F0CC6E" opacity="0.9"/>

    <!-- 'N' cardinal letter -->
    <text x="0" y="-57" text-anchor="middle" fill="#F0CC6E" font-family="Georgia, serif" font-size="9" font-weight="bold" letter-spacing="1">N</text>
  </g>

  <!-- ===================== -->
  <!-- WORDMARK (right)      -->
  <!-- ===================== -->
  <g transform="translate(158, 80)">

    <!-- Main title: CROSSROADS -->
    <text
      x="0" y="-14"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="30"
      font-weight="bold"
      letter-spacing="3"
      fill="#F0CC6E"
    >CROSSROADS</text>

    <!-- Decorative divider line -->
    <line x1="2" y1="-4" x2="228" y2="-4" stroke="#D4A843" stroke-width="0.7" opacity="0.6"/>
    <!-- Decorative dots on line ends -->
    <circle cx="0" cy="-4" r="2" fill="#D4A843" opacity="0.7"/>
    <circle cx="230" cy="-4" r="2" fill="#D4A843" opacity="0.7"/>

    <!-- Sub title: COMPASS -->
    <text
      x="0" y="18"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="21"
      font-weight="normal"
      letter-spacing="10"
      fill="#c9a84c"
      opacity="0.9"
    >COMPASS</text>

    <!-- Tagline -->
    <text
      x="1" y="38"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="9.5"
      letter-spacing="2.5"
      fill="#8a7aaa"
      font-style="italic"
    >your chart · your path · your timing</text>

  </g>
</svg>
